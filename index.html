<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>הזמנה לפרויקט | טלפייר</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============================================
   THEMES — LIGHT (default) & DARK
   ============================================ */
:root {
  --navy: #172B54;
  --navy-dark: #0F1F3D;
  --navy-light: #2A4173;
  --red: #CC2128;
  --red-dark: #A81920;
  --teal: #6DAADC;
  --success: #10B981;

  /* Surfaces & text */
  --bg: #F4F6FA;
  --card: #FFFFFF;
  --card-elevated: #FFFFFF;
  --text: #1A202C;
  --text-muted: #64748B;
  --text-faint: #94A3B8;
  --border: #E2E8F0;
  --border-strong: #CBD5E1;
  --border-focus: #6DAADC;
  --input-bg: #FFFFFF;
  --input-bg-disabled: #F8FAFC;
  --row-hover: #FAFBFD;
  --header-bg: linear-gradient(135deg, #172B54 0%, #2A4173 100%);
  --header-glow: rgba(204,33,40,0.18);

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(23,43,84,0.05);
  --shadow: 0 4px 12px rgba(23,43,84,0.08);
  --shadow-lg: 0 12px 32px rgba(23,43,84,0.12);
  --shadow-dropdown: 0 20px 50px rgba(23,43,84,0.18);

  --radius: 12px;
  --radius-sm: 8px;
}

[data-theme="dark"] {
  --navy: #6DAADC;
  --navy-dark: #4A8FC4;
  --navy-light: #8FBFE3;

  --bg: #0B1426;
  --card: #131F36;
  --card-elevated: #1A2942;
  --text: #E6EDF7;
  --text-muted: #94A8C4;
  --text-faint: #647590;
  --border: #243454;
  --border-strong: #2F4368;
  --border-focus: #6DAADC;
  --input-bg: #1A2942;
  --input-bg-disabled: #131F36;
  --row-hover: #1A2942;
  --header-bg: linear-gradient(135deg, #0F1F3D 0%, #1A2942 100%);
  --header-glow: rgba(204,33,40,0.25);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
  --shadow-dropdown: 0 20px 50px rgba(0,0,0,0.6);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Heebo', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background-color 0.3s, color 0.3s;
}

.app { max-width: 1280px; margin: 0 auto; padding: 24px 20px 60px; }

/* ============================================
   HEADER
   ============================================ */
.header {
  background: var(--header-bg);
  border-radius: var(--radius);
  padding: 28px 32px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -10%;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, var(--header-glow), transparent 70%);
  pointer-events: none;
}
.brand { display: flex; align-items: center; gap: 14px; z-index: 1; }
.brand-mark {
  width: 52px; height: 52px; border-radius: 12px;
  background: var(--red);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(204,33,40,0.4);
}
.brand-mark svg { width: 28px; height: 28px; fill: white; }
.brand-text { color: white; }
.brand-text .name { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; line-height: 1; }
.brand-text .tagline { font-size: 12px; opacity: 0.75; margin-top: 4px; letter-spacing: 0.5px; }

.header-right {
  display: flex; align-items: center; gap: 14px; z-index: 1;
}
.page-title { color: white; font-size: 20px; font-weight: 600; }
.theme-toggle {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
}
.theme-toggle:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }

/* ============================================
   CARDS
   ============================================ */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  transition: background-color 0.3s, border-color 0.3s;
}
.card-title {
  font-size: 17px; font-weight: 700; color: var(--text);
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--bg);
}
.card-title::before {
  content: ''; width: 4px; height: 22px;
  background: var(--red); border-radius: 2px;
}

.fields { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
@media (max-width: 640px) { .fields { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 14px; font-weight: 500; color: var(--text-muted); }
.field label .req { color: var(--red); margin-right: 2px; }

.input {
  width: 100%;
  padding: 12px 14px;
  font-family: inherit;
  font-size: 16px;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  transition: all 0.15s;
  min-height: 48px;
}
.input:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(109,170,220,0.15);
}
.input::placeholder { color: var(--text-faint); }

/* ============================================
   PRODUCTS TABLE
   ============================================ */
.products-card { padding: 24px 20px; }

.products-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
}
.products-count {
  font-size: 13px; color: var(--text-muted);
  background: var(--bg);
  padding: 4px 12px; border-radius: 20px; font-weight: 500;
}

.products-scroll { overflow-x: auto; overflow-y: visible; }

.products-table { width: 100%; border-collapse: separate; border-spacing: 0; }
.products-table thead th {
  background: var(--bg);
  color: var(--text); font-weight: 600; font-size: 13px;
  padding: 12px 14px; text-align: right;
  border: none; white-space: nowrap;
}
.products-table thead th:first-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.products-table thead th:last-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }

.products-table tbody tr { background: var(--card); transition: background 0.15s; }
.products-table tbody tr:hover { background: var(--row-hover); }
.products-table tbody td {
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.products-table tbody td:first-child { padding-right: 14px; }
.products-table tbody td:last-child { padding-left: 14px; }

.row-number {
  font-size: 13px; font-weight: 600; color: var(--text-muted);
  width: 32px; text-align: center;
}

.sku-wrapper { position: relative; }

/* SKU input acts as a chooser button (opens modal on click) */
.sku-input {
  cursor: pointer;
  padding-left: 36px;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2394A3B8' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'%3e%3ccircle cx='11' cy='11' r='8'/%3e%3cline x1='21' y1='21' x2='16.65' y2='16.65'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: left 12px center;
}
.sku-input:disabled {
  cursor: not-allowed;
  background-image: none;
}
.sku-input:not(:disabled):hover {
  border-color: var(--border-focus);
  background-color: var(--row-hover);
}

.cell-cat  { width: 175px; }
.cell-sku  { width: 200px; position: relative; }
.cell-desc { width: auto; }
.cell-qty  { width: 90px; }
.cell-action { width: 50px; }

.product-input {
  width: 100%;
  padding: 10px 12px;
  font-family: inherit;
  font-size: 15px;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  min-height: 44px;
  transition: all 0.15s;
}
.product-input:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(109,170,220,0.15);
}
.product-input[readonly] {
  background: var(--bg); color: var(--text-muted); cursor: default;
}
.product-input:disabled {
  background: var(--input-bg-disabled);
  color: var(--text-faint);
  cursor: not-allowed;
}
.qty-input { text-align: center; font-weight: 600; }

/* ===== CATEGORY SELECT ===== */
.cat-select {
  appearance: none;
  -webkit-appearance: none;
  padding: 10px 32px 10px 12px;
  background-color: var(--input-bg);
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'%3e%3cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2364748B' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: left 12px center;
  font-weight: 500;
  cursor: pointer;
}
[data-theme="dark"] .cat-select {
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'%3e%3cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2394A8C4' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3e%3c/svg%3e");
}
.cat-select[data-filled] {
  background-color: var(--cat-bg);
  border-color: var(--cat-border);
  color: var(--cat-color);
  font-weight: 700;
}
.cat-select[data-filled]:focus { box-shadow: 0 0 0 3px var(--cat-shadow); }

/* ============================================
   SKU PICKER MODAL (centered popup with search)
   ============================================ */
.sku-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.sku-modal-backdrop.open {
  opacity: 1;
  pointer-events: auto;
}
[data-theme="dark"] .sku-modal-backdrop {
  background: rgba(0, 0, 0, 0.7);
}

.sku-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.96);
  width: min(560px, 92vw);
  max-height: 80vh;
  background: var(--card-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  box-shadow: var(--shadow-dropdown);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  overflow: hidden;
}
.sku-modal.open {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: auto;
}

.sku-modal-header {
  padding: 18px 20px 14px;
  background: var(--cat-bg, var(--bg));
  border-bottom: 1px solid var(--cat-border, var(--border));
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.sku-modal-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 700;
  color: var(--cat-color, var(--text));
}
.sku-modal-title .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--cat-color, var(--text));
}
.sku-modal-title .count {
  font-size: 12px;
  font-weight: 500;
  opacity: 0.75;
  margin-right: 4px;
}
.sku-modal-close {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 22px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  line-height: 1;
}
.sku-modal-close:hover {
  background: var(--card);
  color: var(--text);
}

.sku-modal-search-wrap {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--card-elevated);
}
.sku-modal-search {
  width: 100%;
  padding: 12px 14px 12px 42px;
  font-family: inherit;
  font-size: 15px;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  transition: all 0.15s;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2394A3B8' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'%3e%3ccircle cx='11' cy='11' r='8'/%3e%3cline x1='21' y1='21' x2='16.65' y2='16.65'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: left 14px center;
}
.sku-modal-search:focus {
  outline: none;
  border-color: var(--cat-color, var(--border-focus));
  box-shadow: 0 0 0 3px var(--cat-shadow, rgba(109,170,220,0.15));
}
.sku-modal-search::placeholder { color: var(--text-faint); }

.sku-modal-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.sku-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 14px;
  cursor: pointer;
  border-radius: 8px;
  border-right: 3px solid transparent;
  transition: background 0.1s, border-color 0.1s;
}
.sku-option + .sku-option { margin-top: 2px; }
.sku-option:hover,
.sku-option.active {
  background: var(--cat-bg-soft, var(--row-hover));
  border-right-color: var(--cat-color, var(--navy));
}
.sku-option-text {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
  flex: 1;
}
.sku-option-sku {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--cat-color, var(--text));
  letter-spacing: 0.3px;
}
.sku-option-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.4;
}
.sku-option-arrow {
  font-size: 18px;
  color: var(--text-faint);
  opacity: 0;
  transition: opacity 0.1s;
  flex-shrink: 0;
}
.sku-option:hover .sku-option-arrow,
.sku-option.active .sku-option-arrow {
  opacity: 1;
  color: var(--cat-color);
}
.sku-modal-empty {
  padding: 36px 16px;
  text-align: center;
  color: var(--text-faint);
  font-size: 14px;
}
.sku-modal-empty .icon {
  font-size: 32px;
  display: block;
  margin-bottom: 8px;
  opacity: 0.5;
}

.sku-modal-footer {
  padding: 10px 20px;
  font-size: 11px;
  color: var(--text-faint);
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  gap: 14px;
  flex-wrap: wrap;
}
.sku-modal-footer kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  margin: 0 2px;
}

/* Mobile: full-screen modal */
@media (max-width: 640px) {
  .sku-modal {
    width: 100vw;
    height: 100vh;
    max-height: 100vh;
    top: 0;
    left: 0;
    transform: scale(1);
    border-radius: 0;
    border: none;
  }
  .sku-modal.open {
    transform: scale(1);
  }
}

.sku-modal-list::-webkit-scrollbar { width: 8px; }
.sku-modal-list::-webkit-scrollbar-track { background: transparent; }
.sku-modal-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

/* ===== INLINE SHIELD CHIP (CONDITIONAL FOR PANELS) ===== */
.shield-mini {
  margin-top: 6px;
  display: none;
}
.shield-mini.active { display: block; }
.shield-mini label {
  display: inline-flex;
  cursor: pointer;
  user-select: none;
}
.shield-mini input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}
.shield-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  transition: all 0.15s;
  line-height: 1.6;
}
.shield-chip:hover { border-color: var(--text-muted); }
.shield-chip .icon { font-size: 11px; opacity: 0.7; }
.shield-mini input:checked + .shield-chip {
  background: rgba(23,43,84,0.1);
  color: #172B54;
  border-color: rgba(23,43,84,0.35);
  font-weight: 600;
}
.shield-mini input:checked + .shield-chip .icon { opacity: 1; }
.shield-mini input:focus-visible + .shield-chip {
  box-shadow: 0 0 0 2px rgba(109,170,220,0.4);
}
[data-theme="dark"] .shield-mini input:checked + .shield-chip {
  background: rgba(109,170,220,0.18);
  color: #6DAADC;
  border-color: rgba(109,170,220,0.4);
}

/* ============================================
   BUTTONS
   ============================================ */
.btn-remove {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-size: 18px;
}
.btn-remove:hover {
  background: rgba(204,33,40,0.1);
  border-color: var(--red);
  color: var(--red);
}

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 12px 22px;
  font-family: inherit; font-size: 15px; font-weight: 600;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  min-height: 48px;
}
.btn-primary {
  background: var(--red);
  color: white;
  box-shadow: 0 4px 12px rgba(204,33,40,0.25);
}
.btn-primary:hover { background: var(--red-dark); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(204,33,40,0.35); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.btn-secondary {
  background: var(--card);
  color: var(--text);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover { background: var(--bg); border-color: var(--text-muted); }

.btn-add {
  background: var(--navy);
  color: white;
  width: 100%;
  margin-top: 14px;
}
[data-theme="dark"] .btn-add { background: var(--card-elevated); border: 1.5px dashed var(--border-strong); color: var(--text); }
[data-theme="dark"] .btn-add:hover { background: var(--card); border-color: var(--navy); color: var(--navy); }

/* ============================================
   SUBMIT BAR
   ============================================ */
.submit-bar {
  position: sticky;
  bottom: 0;
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 24px;
  margin-top: 20px;
  box-shadow: var(--shadow-lg);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  border: 1px solid var(--border);
}
.submit-summary { font-size: 14px; color: var(--text-muted); }
.submit-summary strong { color: var(--text); font-weight: 700; }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  top: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: white;
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.error { background: var(--red); }

/* ============================================
   TABLET
   ============================================ */
@media (max-width: 900px) {
  .app { padding: 16px 12px 80px; }
  .header { padding: 20px 22px; }
  .card { padding: 20px 16px; }
  .cell-cat { width: 150px; }

// ============================================
// GLOBAL SKU PICKER MODAL
// ============================================
const skuModal = document.getElementById('skuModal');
const skuModalBackdrop = document.getElementById('skuModalBackdrop');
const skuModalSearch = document.getElementById('skuModalSearch');
const skuModalList = document.getElementById('skuModalList');
const skuModalTitle = document.getElementById('skuModalTitle');
const skuModalCount = document.getElementById('skuModalCount');
const skuModalClose = document.getElementById('skuModalClose');

let modalState = {
  category: null,
  onPick: null,
  activeIndex: -1,
  options: []
};

function openSkuModal(category, onPick) {
  modalState.category = category;
  modalState.onPick = onPick;
  modalState.activeIndex = -1;

  const c = catColor(category);
  // Apply category color to modal
  skuModal.style.setProperty('--cat-color', c);
  skuModal.style.setProperty('--cat-bg', c + '14');
  skuModal.style.setProperty('--cat-bg-soft', c + '0C');
  skuModal.style.setProperty('--cat-border', c + '30');
  skuModal.style.setProperty('--cat-shadow', c + '25');

  skuModalTitle.textContent = CATEGORIES[category].label;
  skuModalSearch.value = '';
  rebuildModalList();

  skuModalBackdrop.classList.add('open');
  skuModal.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Focus search after animation
  setTimeout(() => skuModalSearch.focus(), 50);
}

function closeSkuModal() {
  skuModalBackdrop.classList.remove('open');
  skuModal.classList.remove('open');
  document.body.style.overflow = '';
  modalState.onPick = null;
  modalState.category = null;
}

function rebuildModalList() {
  const cat = modalState.category;
  if (!cat) return;
  const query = skuModalSearch.value.trim().toLowerCase();
  modalState.options = PRODUCTS.filter(p => p.cat === cat && (
    !query ||
    p.sku.toLowerCase().includes(query) ||
    p.desc.toLowerCase().includes(query)
  ));

  skuModalCount.textContent = `(${modalState.options.length} מוצרים)`;
  skuModalList.innerHTML = '';

  if (modalState.options.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'sku-modal-empty';
    empty.innerHTML = `<span class="icon">🔍</span>לא נמצאו מוצרים תואמים`;
    skuModalList.appendChild(empty);
    modalState.activeIndex = -1;
    return;
  }

  modalState.options.forEach((p, i) => {
    const opt = document.createElement('div');
    opt.className = 'sku-option';
    opt.dataset.index = i;
    opt.innerHTML = `
      <div class="sku-option-text">
        <div class="sku-option-sku">${p.sku}</div>
        <div class="sku-option-desc">${p.desc}</div>
      </div>
      <span class="sku-option-arrow">←</span>
    `;
    opt.addEventListener('click', () => pickOption(i));
    opt.addEventListener('mouseenter', () => setModalActive(i));
    skuModalList.appendChild(opt);
  });

  modalState.activeIndex = -1;
}

function setModalActive(i) {
  modalState.activeIndex = i;
  [...skuModalList.querySelectorAll('.sku-option')].forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
  if (i >= 0) {
    const el = skuModalList.querySelector(`.sku-option[data-index="${i}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  }
}

function pickOption(i) {
  const p = modalState.options[i];
  if (!p) return;
  const cb = modalState.onPick;
  closeSkuModal();
  if (cb) cb(p);
}

// Modal event listeners
skuModalSearch.addEventListener('input', rebuildModalList);
skuModalClose.addEventListener('click', closeSkuModal);
skuModalBackdrop.addEventListener('click', closeSkuModal);

skuModalSearch.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    setModalActive(Math.min(modalState.activeIndex + 1, modalState.options.length - 1));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    setModalActive(Math.max(modalState.activeIndex - 1, 0));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (modalState.activeIndex >= 0) pickOption(modalState.activeIndex);
    else if (modalState.options.length === 1) pickOption(0);
  } else if (e.key === 'Escape') {
    e.preventDefault();
    closeSkuModal();
  }
});

  // Defensive: ensure shield checkbox NEVER affects SKU
  shieldCheckbox.addEventListener('click', (e) => e.stopPropagation());
  shieldCheckbox.addEventListener('change', (e) => e.stopPropagation());

  // SKU input opens the modal
  skuInput.addEventListener('click', () => {
    if (skuInput.disabled) return;
    const cat = catSelect.value;
    if (!cat) return;
    openSkuModal(cat, (product) => {
      skuInput.value = product.sku;
      descInput.value = product.desc;
      if (!qtyInput.value) qtyInput.focus();
      updateSummary();
    });
  });

  catSelect.addEventListener('change', () => {
    styleCatSelect(catSelect);
    const cat = catSelect.value;
    skuInput.value = '';
    descInput.value = '';
    if (cat) {
      skuInput.disabled = false;
      skuInput.placeholder = 'לחץ לבחירת מק"ט';
    } else {
      skuInput.disabled = true;
      skuInput.placeholder = 'בחר סוג קודם';
    }
    // Show/hide shield chip
    if (cat === 'panels') {
      shieldMini.classList.add('active');
    } else {
      shieldMini.classList.remove('active');
      shieldCheckbox.checked = false;
    }
    updateSummary();
  });

  qtyInput.addEventListener('input', updateSummary);

  removeBtn.addEventListener('click', () => {
    tr.remove();
    renumber();
    updateSummary();
  });

  renumber();
  updateSummary();
  return tr;
}

function renumber() {
  [...tbody.querySelectorAll('tr')].forEach((tr, i) => {
    tr.querySelector('.row-number').textContent = i + 1;
  });
}

function updateSummary() {
  const rows = [...tbody.querySelectorAll('tr')];
  let items = 0, totalQty = 0;
  rows.forEach(tr => {
    const sku = tr.querySelector('.sku-input').value.trim();
    const qty = parseInt(tr.querySelector('.qty-input').value, 10) || 0;
    if (sku && qty > 0) { items++; totalQty += qty; }
  });
  productsCount.textContent = `${rows.length} ${rows.length === 1 ? 'שורה' : 'שורות'}`;
  totalItemsLabel.textContent = items;
  totalQtyLabel.textContent = totalQty;
}

function showToast(msg, type = 'success') {
  toast.textContent = msg;
  toast.className = 'toast show' + (type === 'error' ? ' error' : '');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

// ============================================
// ACTIONS
// ============================================
document.getElementById('addRowBtn').addEventListener('click', () => {
  const tr = addRow();
  tr.querySelector('.cat-select').focus();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('לאפס את כל הטופס?')) return;
  document.getElementById('projectName').value = '';
  document.getElementById('projectManager').value = '';
  document.getElementById('operator').value = '';
  document.getElementById('deliveryDate').value = '';
  tbody.innerHTML = '';
  addRow(); addRow(); addRow();
});

document.getElementById('submitBtn').addEventListener('click', async () => {
  const projectName = document.getElementById('projectName').value.trim();
  const projectManager = document.getElementById('projectManager').value.trim();
  const operator = document.getElementById('operator').value.trim();
  const deliveryDate = document.getElementById('deliveryDate').value;

  if (!projectName || !projectManager || !operator || !deliveryDate) {
    showToast('יש למלא את כל פרטי הפרויקט', 'error');
    return;
  }

  const products = [];
  let invalidRow = false;
  const productRows = [...tbody.querySelectorAll('tr')];
  productRows.forEach(tr => {
    const cat = tr.querySelector('.cat-select').value;
    const sku = tr.querySelector('.sku-input').value.trim();
    const qty = parseInt(tr.querySelector('.qty-input').value, 10);
    if (!cat && !sku && !qty) return;
    const product = skuMap[sku.toUpperCase()];
    if (!cat || !product || product.cat !== cat || !(qty > 0)) {
      invalidRow = true; return;
    }
    const entry = {
      sku: product.sku,
      desc: product.desc,
      category: CATEGORIES[product.cat].label,
      categoryKey: product.cat,
      qty
    };
    if (product.cat === 'panels') {
      const shieldCheckbox = tr.querySelector('.shield-checkbox');
      if (shieldCheckbox) {
        entry.shield = shieldCheckbox.checked;
      }
    }
    products.push(entry);
  });

  if (invalidRow) {
    showToast('יש שורה לא תקינה — בדוק סוג, מק"ט וכמות', 'error');
    return;
  }
  if (products.length === 0) {
    showToast('יש להוסיף לפחות מוצר אחד', 'error');
    return;
  }

  const byCategory = {};
  products.forEach(p => {
    byCategory[p.category] = (byCategory[p.category] || 0) + p.qty;
  });

  const payload = {
    submittedAt: new Date().toISOString(),
    project: {
      name: projectName,
      manager: projectManager,
      operator: operator,
      deliveryDate: deliveryDate
    },
    products,
    summary: {
      lines: products.length,
      totalQty: products.reduce((s, p) => s + p.qty, 0),
      byCategory
    }
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.querySelector('span:first-child').textContent = 'שולח...';

  try {
    if (WEBHOOK_URL === "YOUR_MAKE_WEBHOOK_URL_HERE") {
      console.log('Payload (no webhook configured):', payload);
      showToast('הטופס תקין — אבל לא הוגדר webhook. בדוק קונסול.', 'error');
    } else {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      showToast('ההזמנה נשלחה בהצלחה ✓');
      setTimeout(() => document.getElementById('resetBtn').click(), 1500);
    }
  } catch (err) {
    console.error(err);
    showToast('שגיאה בשליחה — נסה שוב', 'error');
  } finally {
    btn.disabled = false;
    btn.querySelector('span:first-child').textContent = 'שלח הזמנה';
  }
});

// ============================================
// INIT
// ============================================
addRow();
addRow();
addRow();
</script>
</body>
</html>
